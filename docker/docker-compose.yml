version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: flood-api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../models:/app/models
    environment:
      - FLOOD_LSTM_device=cuda
      - FLOOD_XGB_tree_method=gpu_hist
      - FLOOD_XGB_device=cuda:0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: flood-dashboard
    ports:
      - "8501:8501"
    environment:
      - FLOOD_DASH_api_base_url=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: flood-network
