version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: flood-api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../outputs:/app/outputs
      - ../logs:/app/logs
    env_file:
      - ../.env
    environment:
      - FLOOD_LSTM_device=cuda
      - FLOOD_XGB_tree_method=gpu_hist
      - FLOOD_XGB_device=cuda:0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    networks:
      - flood-network

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: flood-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ../data:/app/data
    env_file:
      - ../.env
    environment:
      - FLOOD_DASH_api_base_url=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - flood-network

networks:
  flood-network:
    name: flood-network
    driver: bridge

